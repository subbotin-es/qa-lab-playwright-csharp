name: QA Lab — Playwright C# Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'   # Monday 07:00 UTC — ready before your standup
  workflow_dispatch:        # manual run / rerun from Actions tab

jobs:
  test:
    name: Run Playwright C# Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # required by peaceiris/actions-gh-pages
      checks: write     # required by dorny/test-reporter

    steps:
      - uses: actions/checkout@v4

      # global.json pins the SDK to 8.0.x so the system .NET 10 (pre-installed on
      # ubuntu-latest) is never used. Both .NET 8.0.420 and .NET 10 pass --results-dir
      # as a raw MSBuild switch, which MSBuild.dll rejects as unknown; removing that
      # flag below is the real fix — global.json is belt-and-suspenders for SDK version.
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build — zero warnings
        run: dotnet build --no-restore --configuration Release

      # npx installs the same browser binary that Microsoft.Playwright.NUnit 1.59.0 expects,
      # at the same default path (~/.cache/ms-playwright). Avoids pwsh+playwright.ps1
      # which fails on Linux when the bundled Node.js binary lacks execute permissions.
      - name: Install Playwright browsers
        run: npx -y playwright@1.59.0 install --with-deps chromium

      # ── Smoke tests run on every push / PR ───────────────────────────────
      # NOTE: --results-dir is intentionally omitted.
      # In .NET SDK 8.0.400+, dotnet test passes --results-dir as a raw MSBuild switch
      # which MSBuild.dll rejects with MSB1001 "Unknown switch". Without --results-dir
      # the TRX lands at TestResults/{GUID}/smoke-results.trx; the glob below finds it.
      - name: Run smoke tests
        run: |
          dotnet test --no-build --configuration Release \
            --filter "Category=smoke" \
            --settings QALab.Tests/.runsettings \
            --logger "trx;LogFileName=smoke-results.trx"
        env:
          BASE_URL: https://subbotin.es

      # ── Full regression only when landing on main ─────────────────────────
      - name: Run full regression
        if: github.ref == 'refs/heads/main' && success()
        run: |
          dotnet test --no-build --configuration Release \
            --settings QALab.Tests/.runsettings \
            --logger "trx;LogFileName=full-results.trx"
        env:
          BASE_URL: https://subbotin.es

      # ── Inline test-results panel in the Actions/PR check run ─────────────
      - name: Test results summary
        uses: dorny/test-reporter@v1
        if: always()
        continue-on-error: true
        with:
          name: NUnit Results
          path: '**/TestResults/**/*.trx'
          reporter: dotnet-trx
          fail-on-error: false

      # ── Generate a standalone HTML report from TRX (deployed to Pages) ────
      - name: Generate HTML report
        if: always()
        continue-on-error: true
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.1.10
          reportgenerator \
            "-reports:**/TestResults/**/*.trx" \
            "-targetdir:TestResults/report" \
            "-reporttypes:HtmlInline_AzurePipelines"

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: TestResults/report/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload TRX results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trx-results
          path: '**/TestResults/**/*.trx'
          if-no-files-found: warn
          retention-days: 14

      # ── Deploy report to GitHub Pages (main branch only) ──────────────────
      - name: Deploy report to GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./TestResults/report
          destination_dir: report
          allow_empty_commit: true
